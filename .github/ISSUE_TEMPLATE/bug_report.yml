name: Bug report
description: Report a technical problem with the codebase or local development setup.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Provide exact commands, URLs, and steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste relevant logs (redact secrets).
      render: shell

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend (Laravel)
        - Frontend (Nuxt)
        - Infra (Docker Compose services)
        - Docs
        - Other / unsure
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, versions (PHP/Node/Docker), and anything unusual.
      placeholder: "macOS 14, PHP 8.x, Node 22.x, Docker Desktop x.y"

name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy from
        required: true
        default: master
        type: string

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 1

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ inputs.branch }}
        run: |
          set -euo pipefail

          : "${DEPLOY_HOST:?Set DEPLOY_HOST in repository secrets.}"
          : "${DEPLOY_USER:?Set DEPLOY_USER in repository secrets.}"
          : "${DEPLOY_SSH_KEY:?Set DEPLOY_SSH_KEY in repository secrets.}"
          : "${DEPLOY_BRANCH:?Set the workflow branch input.}"
          DEPLOY_PATH="${DEPLOY_PATH:-/root/know-my-council}"

          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' bash -s" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          git fetch --prune origin
          git checkout "$DEPLOY_BRANCH"
          git reset --hard "origin/$DEPLOY_BRANCH"

          docker compose -f deploy/docker-compose.prod.yml up -d --build --remove-orphans
          docker compose -f deploy/docker-compose.prod.yml exec -T backend php artisan migrate --force
          EOF

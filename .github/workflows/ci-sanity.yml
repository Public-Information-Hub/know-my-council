name: CI Sanity

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  lint-and-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: knowmycouncil_schema_smoke
          POSTGRES_USER: knowmycouncil
          POSTGRES_PASSWORD: knowmycouncil
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U knowmycouncil -d knowmycouncil_schema_smoke"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdown links (internal)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --offline
            --no-progress
            --verbose
            --exclude-path backend/vendor
            --exclude-path frontend/node_modules
            --exclude-path frontend/.nuxt
            README.md docs

      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          strict: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        run: npm ci
        working-directory: frontend

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Frontend typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pgsql, pdo_pgsql
          coverage: pcov
          tools: composer:v2

      - name: Backend install
        run: composer install --no-interaction --prefer-dist
        working-directory: backend

      - name: Backend schema smoke (PostgreSQL)
        run: ../scripts/backend-schema-smoke.sh
        working-directory: backend
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: knowmycouncil_schema_smoke
          DB_USERNAME: knowmycouncil
          DB_PASSWORD: knowmycouncil
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
          MAIL_MAILER: array

      - name: Backend tests (sqlite in-memory)
        run: php artisan test
        working-directory: backend
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array

      - name: Backend coverage (Clover)
        run: |
          mkdir -p coverage
          php -d pcov.enabled=1 -d pcov.directory=app vendor/bin/phpunit --coverage-clover coverage/clover.xml
        working-directory: backend
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array

      - name: Upload coverage (Clover XML)
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-clover
          path: backend/coverage/clover.xml

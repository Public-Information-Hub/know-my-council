name: Repo Hygiene

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]

permissions:
  contents: read

jobs:
  editorconfig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: EditorConfig check
        uses: editorconfig-checker/action-editorconfig-checker@v2
        with:
          version: "3.6.1"
